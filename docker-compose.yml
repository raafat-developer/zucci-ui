services:
  # Local — Vite hot reload → https://api.zucci.xyz (same API as staging)
  # docker compose up local
  local:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    env_file:
      - path: .env.development
        required: false
      - path: .env.local
        required: false

  # Staging build — https://api.zucci.xyz
  # docker compose up staging --build
  staging:
    build:
      context: .
      target: production
      args:
        APP_ENV: staging
    ports:
      - "8081:80"
    restart: unless-stopped

  # Production build — https://api.zucci.com
  # docker compose up prod --build
  prod:
    build:
      context: .
      target: production
      args:
        APP_ENV: production
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  node_modules:
